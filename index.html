<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LC Chaves | Sistema Oficina</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- LOGIN -->

<div class="login-page" id="loginPage">

<div class="login-box">

<img src="logomecanico.jpeg" class="logo-login">

<h1>LC Chaves</h1>

<p>Sistema Administrativo Oficina</p>

<input type="text" id="usuario" placeholder="Usuário">

<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">ENTRAR</button>

<span id="erro"></span>

</div>

</div>

<!-- PAINEL -->

<div class="painel" id="painel">

<header>

<div class="topo">

<div class="empresa">

<img src="logomecanico.jpeg">

<div>

<h2>LC Chaves</h2>

<p>Painel Oficina Mecânica</p>

</div>

</div>

<button class="logout" onclick="logout()">
Sair
</button>

</div>

</header>

<main>

<!-- FORMULÁRIO -->

<section class="card">

<h3>Novo Atendimento</h3>

<form id="formulario">

<div class="grid">

<div class="form-group">
<label>Cliente</label>
<input type="text" id="cliente" required>
</div>

<div class="form-group">
<label>WhatsApp</label>
<input type="text" id="telefone" required>
</div>

<div class="form-group">
<label>Marca</label>
<input type="text" id="marca">
</div>

<div class="form-group">
<label>Modelo</label>
<input type="text" id="modelo">
</div>

<div class="form-group">
<label>Ano</label>
<input type="text" id="ano">
</div>

<div class="form-group">
<label>Placa</label>
<input type="text" id="placa">
</div>

<div class="form-group">
<label>Cor</label>
<input type="text" id="cor">
</div>

<div class="form-group">
<label>KM</label>
<input type="number" id="km">
</div>

</div>

<label>Serviços</label>

<div class="servicos">

<button type="button" onclick="selecionarServico('Troca de Óleo')">Troca Óleo</button>

<button type="button" onclick="selecionarServico('Freio')">Freio</button>

<button type="button" onclick="selecionarServico('Suspensão')">Suspensão</button>

<button type="button" onclick="selecionarServico('Motor')">Motor</button>

<button type="button" onclick="selecionarServico('Injeção')">Injeção</button>

<button type="button" onclick="selecionarServico('Scanner')">Scanner</button>

<button type="button" onclick="selecionarServico('Ar Condicionado')">Ar</button>

<button type="button" onclick="selecionarServico('Revisão Completa')">Revisão</button>

<button type="button" onclick="selecionarServico('Alinhamento')">Alinhamento</button>

<button type="button" onclick="selecionarServico('Balanceamento')">Balanceamento</button>

<button type="button" onclick="selecionarServico('Embreagem')">Embreagem</button>

<button type="button" onclick="selecionarServico('Outros')">Outros</button>

</div>

<div class="grid">

<div class="form-group">
<label>Tipo Serviço</label>
<input type="text" id="tipoServico">
</div>

<div class="form-group">

<label>Status</label>

<select id="status">

<option>Recebido</option>
<option>Em Diagnóstico</option>
<option>Aguardando Peça</option>
<option>Em Manutenção</option>
<option>Finalizado</option>
<option>Entregue</option>

</select>

</div>

<div class="form-group">
<label>Data Entrada</label>
<input type="date" id="entrada">
</div>

<div class="form-group">
<label>Previsão Saída</label>
<input type="date" id="saida">
</div>

<div class="form-group">
<label>Valor Serviço</label>
<input type="number" id="valor">
</div>

<div class="form-group">
<label>Forma Pagamento</label>

<select id="pagamento">

<option>Dinheiro</option>
<option>PIX</option>
<option>Cartão Crédito</option>
<option>Cartão Débito</option>
<option>Boleto</option>

</select>

</div>

</div>

<div class="form-group">

<label>Descrição Serviço</label>

<textarea id="servico"></textarea>

</div>

<div class="form-group">

<label>Peças Trocadas</label>

<textarea id="pecas"></textarea>

</div>

<div class="form-group">

<label>Observações</label>

<textarea id="obs"></textarea>

</div>

<button class="salvar">

Salvar Atendimento

</button>

</form>

</section>

<!-- LISTA -->

<section class="card">

<h3>Veículos em Atendimento</h3>

<div id="lista"></div>

</section>

</main>

</div>

<script src="script.js"></script>

</body>
</html>
